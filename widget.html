<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0f">
<title>FamiliaFit · Racha</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  width: 100%; height: 100dvh;
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
  background: #0a0a0f;
}

/* ── MEMBER SELECT (shown when no ?m= param) ── */
#selectScreen {
  display: none;
  min-height: 100dvh;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  background:
    radial-gradient(ellipse 70% 50% at 50% 0%, rgba(255,87,34,0.1) 0%, transparent 70%),
    #0a0a0f;
}
#selectScreen.on { display: flex; }

.sel-title {
  font-family: 'Syne', sans-serif; font-weight: 800;
  font-size: 1.6rem; text-align: center;
  color: #f0f0f8; margin-bottom: 6px;
}
.sel-sub { color: #8888aa; font-size: 0.85rem; text-align: center; margin-bottom: 36px; line-height: 1.5; }

.sel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 320px; }
.sel-card {
  background: #13131c; border: 1.5px solid rgba(255,255,255,0.07);
  border-radius: 20px; padding: 22px 12px; text-align: center;
  cursor: pointer; text-decoration: none; color: #f0f0f8;
  transition: all 0.2s cubic-bezier(.34,1.4,.64,1);
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.sel-card:active { transform: scale(0.95); }
.sel-card:hover { border-color: rgba(255,87,34,0.4); transform: translateY(-2px); }
.sel-emo { font-size: 2.4rem; }
.sel-name { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem; }
.sel-role { font-size: 0.7rem; color: #8888aa; }

.sel-note {
  margin-top: 28px; font-size: 0.75rem; color: #555570;
  text-align: center; max-width: 280px; line-height: 1.6;
}

/* ── WIDGET SCREEN ── */
#widgetScreen {
  display: none;
  width: 100%; height: 100dvh;
  position: relative;
  overflow: hidden;
}
#widgetScreen.on { display: block; }

/* animated background */
.bg-layer {
  position: absolute; inset: 0;
  transition: background 0.8s ease;
}
.bg-glow {
  position: absolute; inset: 0;
  pointer-events: none;
}
.bg-glow::before {
  content: '';
  position: absolute;
  width: 300px; height: 300px;
  border-radius: 50%;
  top: -80px; left: 50%; transform: translateX(-50%);
  filter: blur(80px);
  animation: glowpulse 4s ease-in-out infinite;
}
@keyframes glowpulse {
  0%, 100% { opacity: 0.5; transform: translateX(-50%) scale(1); }
  50% { opacity: 0.8; transform: translateX(-50%) scale(1.1); }
}

/* noise texture */
.bg-layer::after {
  content: '';
  position: absolute; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: 0.4;
  pointer-events: none;
}

/* main content */
.widget-content {
  position: relative; z-index: 10;
  height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 24px;
  text-align: center;
}

.member-chip {
  display: flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 100px; padding: 8px 16px;
  margin-bottom: 40px;
  animation: fadedown 0.6s ease both;
}
.chip-emo { font-size: 1.2rem; }
.chip-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem; color: #f0f0f8; }
.chip-role { font-size: 0.72rem; color: #8888aa; }

/* fire icon */
.fire-wrap {
  position: relative; margin-bottom: 8px;
  animation: fadein 0.6s 0.1s ease both;
}
.fire-icon {
  font-size: 5rem; line-height: 1;
  filter: drop-shadow(0 0 20px rgba(255,150,50,0.6));
  animation: fireflicker 3s ease-in-out infinite;
  display: block;
}
@keyframes fireflicker {
  0%, 100% { transform: scale(1) rotate(-1deg); filter: drop-shadow(0 0 20px rgba(255,150,50,0.6)); }
  33% { transform: scale(1.04) rotate(1deg); filter: drop-shadow(0 0 30px rgba(255,150,50,0.9)); }
  66% { transform: scale(0.97) rotate(-0.5deg); filter: drop-shadow(0 0 15px rgba(255,150,50,0.5)); }
}

/* streak number */
.streak-num {
  font-family: 'Syne', sans-serif; font-weight: 800;
  font-size: clamp(5rem, 22vw, 8rem);
  line-height: 1; color: #fff;
  letter-spacing: -4px;
  text-shadow: 0 0 60px rgba(255,120,50,0.4);
  animation: popnum 0.7s 0.2s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes popnum {
  from { opacity: 0; transform: scale(0.5); }
  to { opacity: 1; transform: scale(1); }
}

.streak-label {
  font-size: 0.85rem; color: rgba(255,255,255,0.5);
  text-transform: uppercase; letter-spacing: 3px;
  margin-top: 4px; margin-bottom: 36px;
  animation: fadein 0.6s 0.35s ease both;
}

/* today status */
.today-status {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 20px;
  border-radius: 100px;
  font-size: 0.88rem; font-weight: 500;
  animation: fadein 0.6s 0.45s ease both;
  margin-bottom: 28px;
}
.today-status.done {
  background: rgba(0,229,160,0.12);
  border: 1px solid rgba(0,229,160,0.3);
  color: #00e5a0;
}
.today-status.pending {
  background: rgba(255,87,34,0.1);
  border: 1px solid rgba(255,87,34,0.25);
  color: #ff9060;
}

/* week mini dots */
.week-dots {
  display: flex; gap: 8px; margin-bottom: 36px;
  animation: fadein 0.6s 0.5s ease both;
}
.wd {
  width: 32px; height: 32px; border-radius: 10px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-size: 0.55rem; gap: 2px;
  border: 1.5px solid rgba(255,255,255,0.06);
  background: rgba(255,255,255,0.03);
}
.wd.done { background: rgba(0,229,160,0.12); border-color: rgba(0,229,160,0.3); }
.wd.miss { background: rgba(255,61,107,0.08); border-color: rgba(255,61,107,0.2); }
.wd.tod { border-color: rgba(255,87,34,0.6); }
.wd-d { font-family: 'Syne', sans-serif; font-weight: 700; color: #8888aa; font-size: 0.5rem; }
.wd-i { font-size: 0.7rem; }

/* open app btn */
.open-btn {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.6);
  border-radius: 100px; padding: 10px 20px;
  font-size: 0.8rem; text-decoration: none;
  transition: all 0.2s;
  animation: fadein 0.6s 0.6s ease both;
}
.open-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

/* error / loading */
.state-msg {
  color: #8888aa; font-size: 0.9rem; text-align: center;
  position: absolute; inset: 0; display: flex;
  align-items: center; justify-content: center;
  flex-direction: column; gap: 12px;
}
.mini-spinner {
  width: 28px; height: 28px;
  border: 2.5px solid rgba(255,255,255,0.1);
  border-top-color: #ff5722;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* animations */
@keyframes fadein { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadedown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

/* streak milestone ring */
.milestone-ring {
  position: absolute;
  width: min(80vw, 320px); height: min(80vw, 320px);
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.04);
  top: 50%; left: 50%; transform: translate(-50%, -50%);
  pointer-events: none;
  animation: ringpulse 4s ease-in-out infinite;
}
.milestone-ring:nth-child(2) { width: min(90vw, 380px); height: min(90vw, 380px); animation-delay: -1s; opacity: 0.5; }
.milestone-ring:nth-child(3) { width: min(100vw, 440px); height: min(100vw, 440px); animation-delay: -2s; opacity: 0.25; }
@keyframes ringpulse {
  0%, 100% { transform: translate(-50%,-50%) scale(1); opacity: 0.15; }
  50% { transform: translate(-50%,-50%) scale(1.03); opacity: 0.25; }
}
</style>
</head>
<body>

<!-- MEMBER SELECT -->
<div id="selectScreen">
  <div class="sel-title">¿Quién eres? 🔥</div>
  <div class="sel-sub">Elige tu perfil para ver tu racha.<br>Luego agrega esta página a tu pantalla de inicio.</div>
  <div class="sel-grid" id="selGrid"></div>
  <div class="sel-note">
    📱 <strong style="color:#f0f0f8">iPhone:</strong> Safari → compartir → "Agregar a pantalla de inicio"<br>
    📱 <strong style="color:#f0f0f8">Android:</strong> Chrome → menú (⋮) → "Añadir a pantalla de inicio"
  </div>
</div>

<!-- WIDGET -->
<div id="widgetScreen">
  <div class="bg-layer" id="bgLayer">
    <div class="bg-glow" id="bgGlow"></div>
    <div class="milestone-ring"></div>
    <div class="milestone-ring"></div>
    <div class="milestone-ring"></div>
  </div>

  <div class="widget-content" id="widgetContent">
    <div class="state-msg" id="stateMsg">
      <div class="mini-spinner"></div>
      <span>Cargando racha…</span>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ── FIREBASE CONFIG — mismas credenciales que index.html ──────────────
const firebaseConfig = {
  apiKey: "REEMPLAZA_CON_TU_API_KEY",
  authDomain: "REEMPLAZA.firebaseapp.com",
  databaseURL: "https://REEMPLAZA-default-rtdb.firebaseio.com",
  projectId: "REEMPLAZA",
  storageBucket: "REEMPLAZA.appspot.com",
  messagingSenderId: "000000000000",
  appId: "REEMPLAZA_CON_TU_APP_ID"
};

// ── MEMBERS ────────────────────────────────────────────────────────────
const MEMBERS = [
  { id: 'ny',     name: 'NY',     role: 'Papá 💪',        emoji: '🧔' },
  { id: 'moni',   name: 'Moni',   role: 'Mamá ⭐',         emoji: '👩' },
  { id: 'nico',   name: 'Nico',   role: 'El académico 🧑‍💻', emoji: '🧑‍💻' },
  { id: 'tincho', name: 'Tincho', role: 'El hermano 🏃',   emoji: '🧑' },
];

// Color accent per member
const COLORS = {
  ny:     { bg: '#1a0e06', glow: 'rgba(255,120,50,0.25)',  accent: '#ff6030' },
  moni:   { bg: '#06101a', glow: 'rgba(77,184,255,0.2)',   accent: '#4db8ff' },
  nico:   { bg: '#061510', glow: 'rgba(0,229,160,0.2)',    accent: '#00e5a0' },
  tincho: { bg: '#120615', glow: 'rgba(198,120,255,0.2)',  accent: '#c678ff' },
};

const START_DATE = new Date(2025, 4, 20);
const today = new Date(); today.setHours(0,0,0,0);

function dk(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r; }

// ── URL PARAM ──────────────────────────────────────────────────────────
const params = new URLSearchParams(location.search);
const memberId = params.get('m');
const member = MEMBERS.find(x => x.id === memberId);

// ── MAIN APP URL (index.html lives next to widget.html) ────────────────
const APP_URL = 'index.html';

// ── SELECT SCREEN (no param) ───────────────────────────────────────────
if (!member) {
  document.getElementById('selectScreen').classList.add('on');
  document.getElementById('selGrid').innerHTML = MEMBERS.map(m => `
    <a class="sel-card" href="?m=${m.id}">
      <div class="sel-emo">${m.emoji}</div>
      <div class="sel-name">${m.name}</div>
      <div class="sel-role">${m.role}</div>
    </a>`).join('');
} else {
  // ── WIDGET SCREEN ────────────────────────────────────────────────────
  document.getElementById('widgetScreen').classList.add('on');
  document.title = `${member.emoji} ${member.name} · Racha`;

  // apply member theme
  const theme = COLORS[member.id] || COLORS.ny;
  document.getElementById('bgLayer').style.background = theme.bg;
  document.getElementById('bgGlow').style.setProperty('--glow', theme.glow);
  document.querySelector('.bg-glow::before') // via CSS var
  // inject glow color via style tag
  const style = document.createElement('style');
  style.textContent = `.bg-glow::before { background: ${theme.glow}; }`;
  document.head.appendChild(style);

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  onValue(ref(db, 'familiafit/workouts'), snap => {
    const allWorkouts = snap.val() || {};
    const w = allWorkouts[member.id] || {};
    renderWidget(w, theme, member);
  }, err => {
    document.getElementById('stateMsg').innerHTML =
      `<span style="color:#ff5060">Sin conexión 😕</span><span style="font-size:0.75rem">Revisa tu internet</span>`;
  });
}

function getStreak(w) {
  let streak = 0;
  let d = new Date(today);
  if (!w[dk(d)]) d = addDays(d, -1);
  for (let i = 0; i < 400; i++) {
    if (w[dk(d)]) { streak++; d = addDays(d,-1); }
    else break;
  }
  return streak;
}

function streakMessage(n) {
  if (n === 0) return '¡Empieza hoy! 💪';
  if (n === 1) return '¡Primer día! 🌱';
  if (n < 5)  return '¡Vas bien! 🔥';
  if (n < 10) return '¡Imparable! 💥';
  if (n < 21) return '¡Máquina! 🏆';
  if (n < 30) return '¡Élite! ⚡';
  return '¡LEYENDA! 🏅';
}

function renderWidget(w, theme, m) {
  const streak = getStreak(w);
  const todayDone = !!w[dk(today)];
  const days = ['D','L','M','X','J','V','S'];

  // week dots
  let dotsHtml = '';
  for (let i = 6; i >= 0; i--) {
    const d = addDays(today, -i);
    const dkey = dk(d);
    const isBefore = d < START_DATE;
    const isToday = dkey === dk(today);
    const done = w[dkey];
    let cls = isBefore ? '' : (done ? 'done' : 'miss');
    if (isToday) cls += ' tod';
    const icon = isBefore ? '·' : (done ? '✅' : (isToday ? '⏳' : '❌'));
    dotsHtml += `<div class="wd ${cls}">
      <div class="wd-d">${days[d.getDay()]}</div>
      <div class="wd-i">${icon}</div>
    </div>`;
  }

  document.getElementById('stateMsg').style.display = 'none';
  document.getElementById('widgetContent').innerHTML = `
    <div class="member-chip">
      <span class="chip-emo">${m.emoji}</span>
      <div>
        <div class="chip-name">${m.name}</div>
        <div class="chip-role">${m.role}</div>
      </div>
    </div>

    <div class="fire-wrap">
      <span class="fire-icon">🔥</span>
    </div>

    <div class="streak-num" style="color:${streak > 0 ? '#fff' : '#555570'}">${streak}</div>
    <div class="streak-label">días de racha</div>

    <div class="today-status ${todayDone ? 'done' : 'pending'}">
      ${todayDone
        ? '✅ Entrenaste hoy · ' + streakMessage(streak)
        : '⏳ Aún no registras hoy'}
    </div>

    <div class="week-dots">${dotsHtml}</div>

    <a class="open-btn" href="${APP_URL}">
      Abrir FamiliaFit →
    </a>
  `;
}
</script>
</body>
</html>
